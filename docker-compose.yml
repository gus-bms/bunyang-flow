services:
  postgres:
    image: postgres:16-alpine
    container_name: bunyang-flow-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bunyang_flow}
      POSTGRES_USER: ${POSTGRES_USER:-bunyang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bunyang}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bunyang-flow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  postgres-data:
